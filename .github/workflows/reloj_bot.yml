name: Alarma Automatica Gordobot

on:
  schedule:
    # ⏰ Corre todos los días a las 12:00 PM UTC (puedes ajustar el horario luego)
    - cron: '0 12 * * *'
    # ⏰ Corre todos los días a las 8:00 PM UTC
    - cron: '0 20 * * *'
  workflow_dispatch: # Esto te deja activar el bot manualmente con un botón cuando quieras

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Descargando el codigo del bot
        uses: actions/checkout@v4

      - name: Configurando Python gratis
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalando libreria requests
        run: pip install requests

      - name: Executando Gordobot
        run: python bot_ofertas.py